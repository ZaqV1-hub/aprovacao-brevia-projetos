<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brevia | Entregas de projetos</title>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>body { margin: 0; }</style>
</helmet>

<div style="min-height:100vh; background:oklch(0.98 0.006 85); font-family:Helvetica, Arial, sans-serif; color:oklch(0.22 0.015 85);">
  <div style="height:6px; width:100%; background:linear-gradient(90deg, oklch(0.72 0.13 195), oklch(0.64 0.17 250), oklch(0.6 0.19 300), oklch(0.72 0.19 345), oklch(0.63 0.21 25));"></div>

  <sc-if value="{{ !authChecked }}" hint-placeholder-val="{{ true }}">
    <div style="max-width:420px; margin:0 auto; padding:120px 24px; text-align:center; color:oklch(0.55 0.015 85); font-size:14px;">Carregando...</div>
  </sc-if>

  <sc-if value="{{ showLogin }}" hint-placeholder-val="{{ false }}">
    <div style="max-width:420px; margin:0 auto; padding:72px 24px 96px;">
      <div style="font-size:12px; text-transform:uppercase; letter-spacing:0.1em; color:oklch(0.55 0.015 85); margin-bottom:10px;">Brevia</div>
      <h1 style="font-family:Georgia, serif; font-weight:400; font-size:34px; margin:0 0 14px;">Acesso restrito</h1>
      <p style="font-size:15px; line-height:1.6; color:oklch(0.42 0.015 85); margin:0 0 28px;">Entre com o login da Brevia para abrir as entregas.</p>
      <form onSubmit="{{ onLoginSubmit }}" style="display:flex; flex-direction:column; gap:12px; padding:24px; background:#fff; border:1px solid oklch(0.9 0.008 85); border-radius:16px;">
        <label style="display:flex; flex-direction:column; gap:6px; font-size:12px; color:oklch(0.52 0.015 85);">
          Login
          <input type="text" value="{{ username }}" onChange="{{ onUsernameChange }}" placeholder="Digite o login" style="padding:12px 14px; border-radius:10px; border:1px solid oklch(0.88 0.008 85); background:#fff; color:inherit; font-size:14px; font-family:Helvetica, Arial, sans-serif;" />
        </label>
        <label style="display:flex; flex-direction:column; gap:6px; font-size:12px; color:oklch(0.52 0.015 85);">
          Senha
          <input type="password" value="{{ password }}" onChange="{{ onPasswordChange }}" placeholder="Digite a senha" style="padding:12px 14px; border-radius:10px; border:1px solid oklch(0.88 0.008 85); background:#fff; color:inherit; font-size:14px; font-family:Helvetica, Arial, sans-serif;" />
        </label>
        <sc-if value="{{ authError }}" hint-placeholder-val="{{ false }}">
          <div style="font-size:12px; color:oklch(0.58 0.18 28);">{{ authError }}</div>
        </sc-if>
        <button type="submit" style="padding:13px 18px; border-radius:10px; border:none; background:oklch(0.19 0.012 260); color:#fff; font-size:14px; font-weight:600; cursor:pointer;">Entrar</button>
      </form>
    </div>
  </sc-if>

  <sc-if value="{{ showPanel }}" hint-placeholder-val="{{ false }}">
    <div style="max-width:760px; margin:0 auto; padding:64px 24px 96px;">
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:40px; flex-wrap:wrap;">
        <div>
          <div style="font-size:12px; text-transform:uppercase; letter-spacing:0.1em; color:oklch(0.55 0.015 85); margin-bottom:10px;">Brevia</div>
          <h1 style="font-family:Georgia, serif; font-weight:400; font-size:34px; margin:0;">Entregas de projetos</h1>
        </div>
        <button onClick="{{ onLogout }}" style="padding:10px 16px; border-radius:999px; border:1px solid oklch(0.88 0.008 85); background:#fff; color:oklch(0.4 0.015 85); font-size:13px; cursor:pointer;">Sair</button>
      </div>

      <sc-if value="{{ loading }}" hint-placeholder-val="{{ true }}">
        <div style="color:oklch(0.55 0.015 85); font-size:14px;">Carregando...</div>
      </sc-if>

      <sc-if value="{{ showCard }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:18px; padding:20px 22px; background:#fff; border:1px solid oklch(0.9 0.008 85); border-radius:12px; flex-wrap:wrap;">
          <a href="{{ deliveryHref }}" style="display:flex; align-items:center; justify-content:space-between; gap:20px; flex:1 1 320px; min-width:260px; text-decoration:none; color:inherit;">
            <div style="min-width:0;">
              <div style="font-size:12px; color:oklch(0.55 0.015 85); margin-bottom:4px;">{{ clientName }}</div>
              <div style="font-family:Georgia, serif; font-size:18px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ projectTitle }}</div>
            </div>
            <div style="display:flex; align-items:center; gap:14px; flex-shrink:0;">
              <span style="font-size:12px; padding:6px 12px; border-radius:999px; background:{{ badgeBg }}; color:{{ badgeColor }}; white-space:nowrap;">{{ badgeLabel }}</span>
              <span style="color:oklch(0.7 0.01 85); font-size:16px;">→</span>
            </div>
          </a>
          <button onClick="{{ onCopyLink }}" style="padding:10px 14px; border-radius:10px; border:1px solid oklch(0.88 0.008 85); background:oklch(0.99 0.002 85); color:oklch(0.35 0.015 85); font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;">{{ copyLabel }}</button>
        </div>
      </sc-if>
    </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    authChecked: false,
    isAuthenticated: false,
    username: "",
    password: "",
    authError: null,
    loading: true,
    delivery: null,
    copied: false
  };

  async componentDidMount() {
    const { getDelivery } = await import("./data.js");
    this.getDelivery = getDelivery;
    const isAuthenticated = window.sessionStorage.getItem("brevia-auth") === "ok";
    this.setState({ authChecked: true, isAuthenticated });
    if (isAuthenticated) await this.loadDelivery();
  }

  async loadDelivery() {
    const delivery = await this.getDelivery("clube-rincao-migracao-2026");
    this.setState({ loading: false, delivery });
  }

  setUsername = (e) => this.setState({ username: e.target.value, authError: null });
  setPassword = (e) => this.setState({ password: e.target.value, authError: null });

  login = async (e) => {
    e.preventDefault();
    const username = this.state.username.trim();
    const password = this.state.password;
    if (username === "adminbrevia" && password === "brevia123") {
      window.sessionStorage.setItem("brevia-auth", "ok");
      this.setState({
        isAuthenticated: true,
        authError: null,
        username: "",
        password: "",
        loading: true
      });
      await this.loadDelivery();
      return;
    }
    this.setState({ authError: "Login ou senha incorretos." });
  };

  logout = () => {
    window.sessionStorage.removeItem("brevia-auth");
    this.setState({
      isAuthenticated: false,
      username: "",
      password: "",
      authError: null,
      loading: true,
      delivery: null,
      copied: false
    });
  };

  buildDeliveryUrl() {
    const url = new URL("delivery.html", window.location.href);
    url.searchParams.set("id", "clube-rincao-migracao-2026");
    return url.toString();
  }

  copyLink = async () => {
    const link = this.buildDeliveryUrl();
    try {
      await navigator.clipboard.writeText(link);
      this.setState({ copied: true });
      window.setTimeout(() => this.setState({ copied: false }), 2000);
    } catch (err) {
      window.prompt("Copie este link:", link);
    }
  };

  renderVals() {
    const d = this.state.delivery;
    const isApproved = !!d && d.status === "approved";
    return {
      authChecked: this.state.authChecked,
      showLogin: this.state.authChecked && !this.state.isAuthenticated,
      showPanel: this.state.authChecked && this.state.isAuthenticated,
      username: this.state.username,
      password: this.state.password,
      authError: this.state.authError,
      onUsernameChange: this.setUsername,
      onPasswordChange: this.setPassword,
      onLoginSubmit: this.login,
      onLogout: this.logout,
      loading: this.state.loading,
      showCard: !this.state.loading && !!d,
      clientName: d ? d.clientName : "",
      projectTitle: d ? d.projectTitle : "",
      deliveryHref: this.buildDeliveryUrl(),
      badgeLabel: isApproved ? "Aprovado" : "Pendente",
      badgeBg: isApproved ? "oklch(0.92 0.05 160)" : "oklch(0.94 0.03 60)",
      badgeColor: isApproved ? "oklch(0.4 0.1 160)" : "oklch(0.42 0.1 60)",
      copyLabel: this.state.copied ? "Link copiado" : "Copy link",
      onCopyLink: this.copyLink
    };
  }
}

</script>
</body>
</html>
